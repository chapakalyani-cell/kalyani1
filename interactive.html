<!DOCTYPE html>
<html>
<head>
    <title>Simple Data Analytics Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f4;
        }

        .container {
            background: white;
            width: 400px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 80%;
            padding: 8px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: #0078d7;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #005fa3;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Simple Data Analytics</h2>
    <p>Enter numbers separated by commas:</p>

    <input type="text" id="dataInput" placeholder="10, 20, 30, 40, 50">

    <br>
    <button onclick="analyzeData()">Analyze</button>

    <div id="result"></div>
</div>

<script>
function analyzeData() {
    let input = document.getElementById("dataInput").value;

    let numbers = input.split(",")
                       .map(num => Number(num.trim()))
                       .filter(num => !isNaN(num));

    if (numbers.length === 0) {
        document.getElementById("result").innerHTML =
            "<p style='color:red;'>Please enter valid numbers.</p>";
        return;
    }

    let sum = numbers.reduce((a, b) => a + b, 0);
    let average = (sum / numbers.length).toFixed(2);
    let max = Math.max(...numbers);
    let min = Math.min(...numbers);

    document.getElementById("result").innerHTML = `
        <h3>Results</h3>
        <p><strong>Total Values:</strong> ${numbers.length}</p>
        <p><strong>Average:</strong> ${average}</p>
        <p><strong>Highest:</strong> ${max}</p>
        <p><strong>Lowest:</strong> ${min}</p>
    `;
}
</script>

</body>
</html>
